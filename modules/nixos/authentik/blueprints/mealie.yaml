version: 1
metadata:
  name: "Mangrove - Mealie OIDC"
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: "mealie OAuth Mapping: Groups"
    attrs:
      name: "mealie OAuth Mapping: Groups"
      scope_name: "groups"
      expression: |
        return {"groups": [group.name for group in request.user.ak_groups.all()]}
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: "Mealie Provider"
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: "mealie"
      client_secret: !Env MEALIE_OIDC_CLIENT_SECRET
      redirect_uris:
        - url: "https://mealie.schenkenberger.dev/login"
          matching_mode: strict
      property_mappings:
        - !Find [authentik_core.propertymapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
        - !Find [authentik_core.propertymapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
        - !Find [authentik_core.propertymapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "mealie OAuth Mapping: Groups"]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: "mealie"
    attrs:
      name: "Mealie"
      slug: "mealie"
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/mealie.png"
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Mealie Provider]]
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, mealie]]
      group: !Find [authentik_core.group, [name, mealie-user]]
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, mealie]]
      group: !Find [authentik_core.group, [name, mealie-admin]]
      order: 10
    attrs:
      enabled: true
