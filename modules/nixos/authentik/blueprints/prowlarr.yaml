version: 1
metadata:
  name: "Mangrove - Prowlarr"
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: "Prowlarr Provider"
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      external_host: "https://prowlarr.schenkenberger.dev"
      mode: forward_single
      cookie_domain: "schenkenberger.dev"
  - model: authentik_core.application
    state: present
    identifiers:
      slug: "prowlarr"
    attrs:
      name: "Prowlarr"
      slug: "prowlarr"
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/prowlarr.png"
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, Prowlarr Provider]]
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, prowlarr]]
      group: !Find [authentik_core.group, [name, super-admin]]
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, prowlarr]]
      group: !Find [authentik_core.group, [name, arr-admin]]
      order: 10
    attrs:
      enabled: true
