version: 1
metadata:
  name: "Mangrove - Home Assistant"
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: "Home Assistant Provider"
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      external_host: "https://homeassistant.schenkenberger.dev"
      mode: forward_single
      cookie_domain: "schenkenberger.dev"
  - model: authentik_core.application
    state: present
    identifiers:
      slug: "home-assistant"
    attrs:
      name: "Home Assistant"
      slug: "home-assistant"
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/home-assistant.png"
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, Home Assistant Provider]]
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, home-assistant]]
      group: !Find [authentik_core.group, [name, super-admin]]
      order: 0
    attrs:
      enabled: true
