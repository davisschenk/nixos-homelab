version: 1
metadata:
  name: "Mangrove - Radarr"
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: "Radarr Provider"
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      external_host: "https://radarr.schenkenberger.dev"
      mode: forward_single
      cookie_domain: "schenkenberger.dev"
  - model: authentik_core.application
    state: present
    identifiers:
      slug: "radarr"
    attrs:
      name: "Radarr"
      slug: "radarr"
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/radarr.png"
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, Radarr Provider]]
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, radarr]]
      group: !Find [authentik_core.group, [name, arr-admin]]
      order: 0
    attrs:
      enabled: true
