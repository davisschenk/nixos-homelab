version: 1
metadata:
  name: "Mangrove - RomM OIDC"
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: "RomM Provider"
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: "romm"
      client_secret: !Env ROMM_OIDC_CLIENT_SECRET
      redirect_uris:
        - url: "https://romm.schenkenberger.dev/api/oauth/openid"
          matching_mode: strict
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: "romm"
    attrs:
      name: "RomM"
      slug: "romm"
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons@main/png/romm.png"
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, RomM Provider]]
      policy_engine_mode: any
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, romm]]
      group: !Find [authentik_core.group, [name, romm-admin]]
      order: 0
    attrs:
      enabled: true
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !Find [authentik_core.application, [slug, romm]]
      group: !Find [authentik_core.group, [name, romm-user]]
      order: 10
    attrs:
      enabled: true
